<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWN Health – Das Konto für deine Gesundheit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section class="hero">

    <!-- Gradient: Figma SVG ellipses, exact positions -->
    <div class="gradient-layer" aria-hidden="true">

      <!-- Ellipse 37: #112433 dark navy, blur 54, at (-354, -364) in hero coords -->
      <svg class="grad-ellipse grad-ellipse--dark" viewBox="0 0 2828 2828" preserveAspectRatio="none">
        <defs>
          <filter id="blur-dark" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="54" />
          </filter>
        </defs>
        <circle cx="1414" cy="1414" r="1305" fill="#112433" filter="url(#blur-dark)" />
      </svg>

      <!-- Ellipse 35: #3DB7EE teal, blur 218, at (-362, 549) in hero coords -->
      <svg class="grad-ellipse grad-ellipse--teal" viewBox="0 0 3483 3483" preserveAspectRatio="none">
        <defs>
          <filter id="blur-teal" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="218" />
          </filter>
        </defs>
        <circle cx="1741" cy="1741" r="1305" fill="#3DB7EE" filter="url(#blur-teal)" />
      </svg>

      <!-- Ellipse 34: White circle, no blur, at (-354, 436) -->
      <svg class="grad-ellipse grad-ellipse--white" viewBox="0 0 2610 2610" preserveAspectRatio="none">
        <circle cx="1305" cy="1305" r="1305" fill="white" />
      </svg>

    </div>

    <!-- Logo -->
    <a href="#" class="logo" aria-label="OWN Health">
      <svg width="47" height="47" viewBox="0 0 46.9117 46.9117" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.63213 23.4559C7.63213 14.7167 14.7167 7.63213 23.4559 7.63213C32.195 7.63213 39.2482 14.5335 39.2482 23.2726C39.2482 23.7172 39.2297 24.32 39.2232 24.7743H46.8738C46.8976 24.3374 46.9117 23.8982 46.9117 23.4559C46.9106 10.5011 36.4096 0 23.4559 0C10.5022 0 0 10.5011 0 23.4559C0 36.4106 10.5011 46.9117 23.4559 46.9117C23.8191 46.9117 24.1791 46.902 24.538 46.8857V39.2417C24.1802 39.2655 23.8202 39.2796 23.4559 39.2796C14.7167 39.2796 7.63213 32.195 7.63213 23.4559Z" fill="#232729"/>
        <path d="M39.1581 24.7742H31.8621V46.9116H39.1581V24.7742Z" fill="#232729"/>
        <path d="M46.0551 39.2846V31.9886H24.6083V39.2846H46.0551Z" fill="#232729"/>
      </svg>
    </a>

    <!-- Navigation -->
    <nav class="nav">
      <a href="#" class="nav__link">START</a>
      <a href="#" class="nav__link">IMPRESSUM</a>
      <a href="#" class="nav__link">DATENSCHUTZ</a>
      <a href="#" class="nav__link">AGB</a>
    </nav>

    <!-- Dashed Line -->
    <div class="divider" aria-hidden="true">
      <svg preserveAspectRatio="none" width="100%" height="1" viewBox="0 0 1187 0.2" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="0.1" y1="0.1" x2="1186.9" y2="0.1" stroke="url(#lineGrad)" stroke-width="0.2" stroke-linecap="square" stroke-dasharray="4 10"/>
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0.7" x2="1187" y2="0.7" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F2F2F2"/>
            <stop offset="1" stop-color="#F2F2F2" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Hero Content -->
    <div class="hero__content">
      <h1 class="hero__title">Das Konto für<br>deine Gesundheit</h1>
      <p class="hero__subtitle">Alle deine Gesundheitsdaten an einem Ort.<br>Sicher,</p>

      <form class="waitlist" action="#" method="post">
        <input type="email" class="waitlist__input" placeholder="DEINE EMAIL" required>
        <button type="submit" class="waitlist__btn">IN WARTELISTE EINTRAGEN</button>
      </form>
    </div>

    <!-- Scroll Arrow -->
    <div class="scroll-arrow" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 5V19M12 19L6 13M12 19L18 13" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </section>

</body>
</html>
